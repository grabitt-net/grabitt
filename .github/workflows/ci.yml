name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Prisma types must exist for the server/web type check to resolve.
      - name: Generate Prisma Client
        run: pnpm --filter server exec prisma generate

      - name: Type check
        run: pnpm turbo typecheck

      - name: Lint
        run: pnpm turbo lint

  test-server:
    name: Server Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: grabitt
          POSTGRES_PASSWORD: grabitt
          POSTGRES_DB: grabitt_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter server exec prisma generate

      # Sync the full schema (db push avoids drift from ad-hoc migrations).
      # DIRECT_URL is required by the schema's datasource block.
      - name: Sync database schema
        working-directory: server
        env:
          DATABASE_URL: postgresql://grabitt:grabitt@localhost:5432/grabitt_test
          DIRECT_URL: postgresql://grabitt:grabitt@localhost:5432/grabitt_test
        run: pnpm prisma db push --skip-generate

      - name: Run tests
        working-directory: server
        env:
          DATABASE_URL: postgresql://grabitt:grabitt@localhost:5432/grabitt_test
          DIRECT_URL: postgresql://grabitt:grabitt@localhost:5432/grabitt_test
          JWT_SECRET: test-jwt-secret-ci
          EXEC_JWT_SECRET: test-exec-jwt-secret-ci
          NODE_ENV: test
        run: pnpm test

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter server exec prisma generate

      - name: Build web app
        working-directory: apps/web
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: pnpm build

  mobile-export:
    name: Mobile Export Check
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Expo doctor
        working-directory: apps/mobile
        run: pnpm exec expo-doctor

  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: build-web
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy to Vercel preview
        working-directory: apps/web
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          pnpm exec vercel pull --yes --environment=preview --token=$VERCEL_TOKEN
          pnpm exec vercel build --token=$VERCEL_TOKEN
          pnpm exec vercel deploy --prebuilt --token=$VERCEL_TOKEN
